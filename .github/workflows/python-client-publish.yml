name: allen-powerplatform-client Python package publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - aind_api_connector_prod_openapi.yaml
      - openapirc_python_client.json
      - .openapi-generator-ignore

jobs:
  bump_version:
    name: Bump version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.output_version.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.SERVICE_TOKEN }}
      - name: Pull latest changes
        run: git pull origin main
      - name: Compute new version number
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.SERVICE_TOKEN }}
          release_branches: main
          default_bump: patch
          dry_run: true  # Perform dryrun first to calculate new version
      - name: Update version file with new version
        run: |
          grep "packageVersion" openapirc_python_client.json
          sed -i --debug --expression="s|\"packageVersion\".*|\"packageVersion\": \"${{ steps.tag_version.outputs.new_version }}\"|" openapirc_python_client.json
      - name: Set output
        id: output_version
        run: echo "new_version=${{ steps.tag_version.outputs.new_version }}" >> "$GITHUB_OUTPUT"
      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          message: "ci: version bump [skip actions]"
          add: openapirc_python_client.json
  build_client:
    runs-on: ubuntu-latest
    needs: bump_version
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.SERVICE_TOKEN }}
      - name: Pull latest changes
        run: git pull origin main
      - name: Remove previous client
        run: rm -rf clients/prod
      - name: Generate new python client
        uses: openapi-generators/openapitools-generator-action@v1.5.0
        with:
          generator: python
          generator-tag: v7.13.0
          openapi-file: aind_api_connector_prod_openapi.yaml
          config-file: openapirc_python_client.json
          command-args: >
            --output clients/prod
            --ignore-file-override .openapi-generator-ignore
      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          default_author: github_actions
          message: "ci: add clients [skip actions]"
          add: '["clients/prod"]'
  update_tag:
    runs-on: ubuntu-latest
    needs: [ bump_version, build_client ]
    steps:
      - uses: actions/checkout@v4
      - name: Pull latest changes
        run: git pull origin main
      - name: Update tag
        run: |
          git tag v${{ needs.bump_version.outputs.new_version }}
          git push origin v${{ needs.bump_version.outputs.new_version }}
  publish_client:
    needs: update_tag
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./clients/prod
    steps:
      - uses: actions/checkout@v4
      - name: Pull latest changes
        run: git pull origin main
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install --upgrade setuptools wheel twine build
          python -m build
          twine check dist/*
      - name: Publish on PyPI
        uses: pypa/gh-action-pypi-publish@release/v1.12
        with:
          packages-dir: ./clients/prod/dist
          password: ${{ secrets.AIND_PYPI_TOKEN }}
